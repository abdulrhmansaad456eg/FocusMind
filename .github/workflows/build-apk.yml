name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'EAS profile (preview = APK, production = AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run lint

      - name: EAS build (wait) and download artifact
        shell: bash
        run: |
          set -euo pipefail
          PROFILE="${{ github.event.inputs.build_type || 'preview' }}"
          echo "Using EAS profile: $PROFILE"
          eas build --platform android --profile "$PROFILE" --non-interactive --wait --json > build-output.json
          echo "---- build JSON (truncated) ----"
          head -c 4000 build-output.json || true
          echo ""
          APK_URL="$(jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty' build-output.json)"
          if [[ -z "$APK_URL" || "$APK_URL" == "null" ]]; then
            echo "Could not read artifact URL from EAS output."
            exit 1
          fi
          echo "Artifact URL resolved."
          if [[ "$PROFILE" == "production" ]]; then
            OUT="FocusMind.aab"
          else
            OUT="FocusMind.apk"
          fi
          curl -fL --retry 4 --retry-delay 8 --connect-timeout 30 -o "$OUT" "$APK_URL"
          ls -la "$OUT"

      - name: Resolve artifact file
        id: artifact
        shell: bash
        run: |
          if [ -f FocusMind.apk ]; then echo "file=FocusMind.apk" >> "$GITHUB_OUTPUT"
          elif [ -f FocusMind.aab ]; then echo "file=FocusMind.aab" >> "$GITHUB_OUTPUT"
          else echo "No FocusMind.apk or FocusMind.aab found"; ls -la; exit 1; fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: focusmind-android-${{ github.event.inputs.build_type || 'preview' }}-${{ github.run_number }}
          path: ${{ steps.artifact.outputs.file }}

      - name: Build summary
        if: success()
        run: |
          echo "Build finished. Download the APK/AAB from the workflow **Artifacts** section."
          echo "Expo dashboard: https://expo.dev/accounts/abdulrhmansaad456eg/projects/FocusMind/builds"
