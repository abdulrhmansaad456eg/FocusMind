name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build APK
        run: |
          eas build --platform android --profile ${{ github.event.inputs.build_type || 'preview' }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get Build URL
        if: success()
        run: |
          echo "✅ APK Build Submitted to EAS!"
          echo "Monitor build at: https://expo.dev/accounts/abdulrhmansaad456eg/projects/FocusMind/builds"
          echo "Build Number: ${{ github.run_number }}"

      - name: Get APK URL
        if: success()
        run: |
          echo "✅ APK Build Complete!"
          echo "Download the APK from the Artifacts section above."
          echo "Build Number: ${{ github.run_number }}"
