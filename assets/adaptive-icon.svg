<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <!-- Android Adaptive Icon Foreground -->
  <!-- Background is handled separately in app.json -->
  
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Remi Body centered in safe zone (center 66x66) -->
  <g transform="translate(54, 54)">
    <ellipse cx="0" cy="0" rx="33" ry="30" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Eyes -->
    <ellipse cx="-12" cy="-8" rx="5" ry="6" fill="#1e293b"/>
    <ellipse cx="12" cy="-8" rx="5" ry="6" fill="#1e293b"/>
    
    <!-- Blush -->
    <ellipse cx="-22" cy="8" rx="6" ry="4" fill="#3b82f6" opacity="0.3"/>
    <ellipse cx="22" cy="8" rx="6" ry="4" fill="#3b82f6" opacity="0.3"/>
  </g>
</svg>
